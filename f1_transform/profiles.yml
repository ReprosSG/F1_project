f1_transform:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: f1_database.duckdb
      extensions:
        - httpfs
        - azure
      settings:
        ca_cert_file: '/etc/ssl/certs/ca-certificates.crt'
      secrets:
        - type: azure
          connection_string: "{{ env_var('AZURE_STORAGE_CONNECTION_STRING') }}"